# HumanoidGetUp env configuration. qpos layout matches the 21-DOF dm_control
# humanoid: [root_pos(3), root_quat(4), abdomen(3), L_leg(6), R_leg(6),
#            R_arm(3), L_arm(3)]. The "standing" anchor is taken from the
# model's qpos0 at construction time and is not listed here.
joint_jitter: 0.02

head_bonus:
  weight: 0.5
  target: 1.4    # meters
  sigma:  0.7

# Stability terms; both gate on head_z > head_z_min so they don't fire
# from non-standing poses.
foot_flat:
  weight: 0.3       # reward foot.xmat[2,2] (=1 when sole flat on floor)

stillness:
  weight: 1.0       # penalty on ||CoM horizontal velocity||^2
  head_z_min: 1.3

